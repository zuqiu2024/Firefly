backend:
  name: github
  repo: zuqiu2024/Firefly
  branch: main
  base_url: https://www.zhanxx81201.dpdns.org
  auth_endpoint: /api/auth

# 开启工作流：文章会先存为草稿，你在后台点击“发布”后才会真正推送到 main 分支
publish_mode: editorial_workflow

# 媒体文件配置
media_folder: "public/assets/images"
public_folder: "/assets/images"

collections:
  - name: "posts"
    label: "文章管理"
    folder: "src/content/posts"
    create: true
    # 强制文件名格式，方便 Astro 排序
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "published", widget: "datetime" }
      - { label: "描述/摘要", name: "description", widget: "string", required: false }
      - { label: "封面图", name: "image", widget: "image", required: false }
      - { label: "标签", name: "tags", widget: "list", default: ["Blog"] }
      - { label: "分类", name: "category", widget: "string", default: "默认" }
      - { label: "正文", name: "body", widget: "markdown" }
